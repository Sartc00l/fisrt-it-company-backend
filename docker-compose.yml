services:
  db:
    image: postgres:16-alpine
    container_name: dds_postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      additional_contexts:
        root: .
    container_name: dds_django_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata api/fixtures/initial_data.json &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dds_react_frontend
    ports:
      - "3000:3000"
    depends_on:
      - web

volumes:
  postgres_data: